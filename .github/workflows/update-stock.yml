name: Actualizar Stock desde Appweb

on:
  schedule:
    - cron: '0 12-23 * * *'
    - cron: '0 0-4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-stock:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias
        run: npm install xlsx
      
      - name: Descargar y parsear stock
        run: node scripts/download-stock.js
      
      - name: Verificar cambios
        id: verify-changes
        run: |
          if git diff --quiet public/stock_data.json; then
            echo "No hay cambios en el stock"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Hay cambios en el stock"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Crear rama y PR
        if: steps.verify-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          BRANCH_NAME="update/stock-${TIMESTAMP}"
          git checkout -b "$BRANCH_NAME"
          
          git add public/stock_data.json
          git commit -m "Actualizar stock desde appweb - $(date +'%Y-%m-%d %H:%M')"
          git push origin "$BRANCH_NAME"
          
          # Crear PR usando API REST
          curl -X POST https://api.github.com/repos/${{ github.repository }}/pulls \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "title": "Actualizar Stock - "'"$(date +'%Y-%m-%d')"'",
              "body": "Este PR actualiza automaticamente el stock desde la appweb.",
              "head": "'"$BRANCH_NAME"'",
              "base": "main"
            }'
      
      - name: Copiar archivos a gh-pages
        if: steps.verify-changes.outputs.has_changes == 'true'
        run: |
          cp public/stock_data.json /tmp/stock_data.json
          cp public/productos_local.json /tmp/productos_local.json
          
          cleanup() {
            local exit_code=$?
            echo "Volviendo a main..."
            if ! git checkout main 2>/dev/null; then
              git checkout -b main origin/main 2>/dev/null || echo "No se pudo volver a main"
            fi
            return $exit_code
          }
          trap cleanup EXIT
          
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          
          cp /tmp/stock_data.json stock_data.json
          cp /tmp/productos_local.json productos_local.json
          
          git add stock_data.json productos_local.json 404.html
          git commit -m "Sync: Actualizar stock - $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push origin gh-pages
